<IfModule mod_ssl.c>
<VirtualHost *:443>

    ServerName albumz.spudalicio.us
    ServerAdmin webmaster@spudalicio.us
    DocumentRoot /var/www/spudalicio.us/albumz
    ErrorLog ${APACHE_LOG_DIR}/albumz-error.log
    CustomLog ${APACHE_LOG_DIR}/albumz-access.log combined

    # Proxy everything to the SvelteKit Node server on port 3200
    ProxyPreserveHost  On
    ProxyPass          / http://127.0.0.1:3200/
    ProxyPassReverse   / http://127.0.0.1:3200/

    # WebSocket support (forward-compatible — SvelteKit prod doesn't use WS today)
    RewriteEngine On
    RewriteCond %{HTTP:Upgrade} websocket [NC]
    RewriteCond %{HTTP:Connection} upgrade [NC]
    RewriteRule /(.*) ws://127.0.0.1:3200/$1 [P,L]

    RequestHeader set X-Forwarded-Proto "https"

    # Generous upload limit for CSV/XLSX imports (10 MiB)
    LimitRequestBody   10485760

SSLCertificateFile /etc/letsencrypt/live/spudalicio.us/fullchain.pem
SSLCertificateKeyFile /etc/letsencrypt/live/spudalicio.us/privkey.pem
</VirtualHost>
</IfModule>
