<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="text-scale" content="scale" />
		<link rel="icon" type="image/svg+xml" href="/icon.svg" />
		<!-- The manifest link is set per-route in +layout.svelte, not here: browsers
		     honour the *first* <link rel="manifest"> and ignore the rest, so a global
		     one here would always beat the Headliner/Mini manifests and every install
		     would just be "Albumz". One path-aware link keeps the right app installable. -->
		<meta name="theme-color" content="#08070a" />
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
